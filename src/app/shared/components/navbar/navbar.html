<div class="relative w-full z-50">
  <header class="bg-[#F0FAFF] py-4 px-4 md:pt-6 md:pb-8 md:px-10 border-b-2 border-[#A7E9FF]">
    <div class="max-w-7xl mx-auto flex flex-wrap lg:flex-nowrap justify-between items-center gap-y-6 gap-x-4 md:gap-10">
      
      <div class="flex flex-col items-start gap-2 shrink-0 order-1">
        <a href="#" class="text-4xl md:text-5xl font-black text-[#FF8DA1] tracking-tighter italic hover:opacity-80 transition leading-none">
          GLOSSY
        </a>
        <div class="px-3 py-1 bg-[#FFDDE4] text-[#FF8DA1] text-[9px] md:text-[10px] font-bold uppercase tracking-[0.2em] border border-[#FF8DA1]">
          Summer Makeup Edition ✨
        </div>
      </div>

      <div class="order-3 lg:order-2 w-full lg:flex-1 lg:max-w-2xl flex flex-col gap-4">
        
        <nav class="group/nav relative flex items-center">
  <div class="flex flex-nowrap gap-2 overflow-x-auto pb-1 scrollbar-hide cursor-grab active:cursor-grabbing" 
       style="scrollbar-width: none; -ms-overflow-style: none; -webkit-overflow-scrolling: touch;">
    
    <a (click)="goProducts()"
      class="shrink-0 px-5 py-1.5 bg-[#FF8DA1] text-white text-[10px] md:text-xs font-black uppercase tracking-widest transition-all hover:scale-105 cursor-pointer shadow-[2px_2px_0px_#FFDDE4]">
      Todo
    </a>

    @for (cat of categories(); track cat.id) {
      <a (click)="goToCategory(cat.id)"
        class="shrink-0 px-5 py-1.5 bg-white border border-[#FFDDE4] text-[#FF8DA1] text-[10px] md:text-xs font-bold uppercase tracking-wider transition-all hover:bg-[#FFF4F7] hover:border-[#FF8DA1] cursor-pointer whitespace-nowrap">
        {{ cat.name }}
      </a>
    }
  </div>

  <div class="pointer-events-none absolute right-0 top-0 bottom-1 w-12 bg-gradient-to-l from-[#F0FAFF] to-transparent"></div>
</nav>

<style>
  /* Fuerza el ocultamiento de la barra en Chrome/Safari */
  .scrollbar-hide::-webkit-scrollbar {
    display: none;
  }
</style>

        <div class="flex items-center w-full bg-white border-2 border-[#A7E9FF] overflow-visible h-11 md:h-13 relative group shadow-[4px_4px_0px_#A7E9FF]">
          <input
  type="text"
  [value]="searchTerm()"
  (input)="onSearchInput($event)"
  (keyup.enter)="onSearchSubmit()"
  (blur)="closeDropdown()"
  class="flex-1 h-full px-4 text-xs md:text-sm font-medium text-gray-600 placeholder-[#A7E9FF] focus:outline-none bg-transparent"
  placeholder="BUSCA TU LOOK DE VERANO..."
/>
          <button (click)="onSearchSubmit()" class="h-full px-4 border-l-2 border-[#A7E9FF] text-[#49B6D6] hover:bg-[#F0FAFF] transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          </button>

          @if (showDropdown()) {
            <div class="absolute top-[calc(100%+8px)] left-[-2px] right-[-2px] bg-white border-2 border-[#A7E9FF] z-50 shadow-xl">
              @for (product of searchResults().slice(0, 5); track product.id) {
                <button (mousedown)="goToProduct(product)" class="w-full flex items-center gap-4 px-4 py-3 hover:bg-[#F0FAFF] border-b border-[#F0FAFF] last:border-none transition-colors">
                  <div class="w-12 h-12 bg-gray-50 border border-gray-100 shrink-0">
                    <img [src]="getProductImage(product)" class="w-full h-full object-cover"/>
                  </div>
                  <div class="flex-1 text-left">
                    <p class="text-xs font-black text-gray-800 uppercase tracking-tighter">{{ product.name }}</p>
                    <p class="text-[10px] text-[#49B6D6] font-bold">{{ getMinPrice(product) }}</p>
                  </div>
                </button>
              }
            </div>
          }
        </div>
      </div>

      <div class="flex items-center justify-end shrink-0 order-2 lg:order-3">
        <button (click)="goToCart()" class="flex items-center gap-3 group relative">
          <div class="flex flex-col items-end mr-1">
            <span class="text-[9px] text-[#A7E9FF] font-black uppercase tracking-[0.2em]">Mi Bolsa</span>
            <span class="text-xs text-gray-700 font-bold group-hover:text-[#FF8DA1] transition-colors">CHECKOUT</span>
          </div>
          <div class="w-12 h-12 bg-[#FF8DA1] flex items-center justify-center border-2 border-white shadow-[3px_3px_0px_#FFDDE4] group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
            <span class="absolute -top-1 -right-1 bg-[#49B6D6] text-white text-[10px] font-black w-5 h-5 flex items-center justify-center border-2 border-white leading-none">*</span>
          </div>
        </button>
      </div>

    </div>
  </header>

  <div class="flex w-full h-1.5">
    <div class="flex-1 bg-[#FF8DA1]"></div>
    <div class="flex-1 bg-[#FFDDE4]"></div>
    <div class="flex-1 bg-[#A7E9FF]"></div>
    <div class="flex-1 bg-[#E5F9FF]"></div>
  </div>
</div>
