<section class="relative w-full py-8 md:py-12 bg-[#F0FAFF] border-y-2 border-[#A7E9FF] overflow-hidden">

  <div class="absolute inset-0 z-0 opacity-30">
    <div class="absolute inset-0 bg-[radial-gradient(#A7E9FF_1px,transparent_1px)] [background-size:20px_20px]"></div>
  </div>

  <div class="relative z-10 w-full max-w-7xl mx-auto px-4 sm:px-10">
    
    <div class="text-center mb-8">
      <p class="text-[9px] font-black text-[#49B6D6] uppercase tracking-[0.4em] mb-2">Categorías</p>
      <div class="h-[2px] w-10 bg-[#FF8DA1] mx-auto"></div>
    </div>

    <div *ngIf="categories$ | async as categories"
         class="flex flex-row flex-nowrap gap-4 md:gap-8 overflow-x-auto pb-6 hide-scrollbar snap-x justify-start md:justify-center">

      <div *ngFor="let cat of categories; let i = index"
           (click)="selectCategoryAndGoToProducts()"
           class="flex flex-col items-center cursor-pointer min-w-[90px] md:min-w-[130px] snap-center group">

        <div 
          [ngClass]="{
            'bg-[#FFDDE4] shadow-[4px_4px_0px_#FF8DA1]': i % 3 === 0,
            'bg-[#E5F9FF] shadow-[4px_4px_0px_#A7E9FF]': i % 3 === 1,
            'bg-white shadow-[4px_4px_0px_#F0FAFF]': i % 3 === 2
          }"
          class="relative w-16 h-16 md:w-20 md:h-20 border-2 border-white transition-all duration-300 group-hover:-translate-y-1 group-hover:translate-x-1 group-hover:shadow-none">

          <div class="w-full h-full overflow-hidden">
            <img [src]="cat.image" [alt]="cat.name"
                 class="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-500">
          </div>

          <div class="absolute -top-2 -left-2 bg-white border border-gray-100 text-[8px] font-black px-1.5 py-0.5 text-gray-400">
            0{{i + 1}}
          </div>
        </div>

        <h3 class="mt-5 text-[10px] md:text-[11px] font-black text-gray-800 text-center uppercase tracking-[0.2em] leading-tight group-hover:text-[#FF8DA1] transition-colors">
          {{ cat.name }}
        </h3>
        
        <div class="w-0 h-[3px] bg-[#FF8DA1] mt-1 transition-all duration-300 group-hover:w-full"></div>

      </div>
    </div>

  </div>
</section>
