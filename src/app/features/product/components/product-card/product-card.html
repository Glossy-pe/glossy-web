<div class="group flex flex-col bg-white border-2 border-[#F0FAFF] transition-all duration-300 h-full hover:border-[#FFDDE4] relative">
  
  <div class="relative aspect-[3/4] overflow-hidden bg-[#FFFDF9] cursor-pointer"
       (click)="viewProductDetail(this.productResponseFull!)">

    <div class="absolute top-0 left-0 z-20"
         *ngIf="getTotalStock(this.productResponseFull!) == 0">
      <span class="text-[9px] font-black uppercase tracking-widest text-white bg-[#49B6D6] px-3 py-1.5 shadow-[4px_4px_0px_#E5F9FF]">
        Sold Out
      </span>
    </div>

    <div class="absolute top-0 left-0 z-20"
         *ngIf="getTotalStock(this.productResponseFull!) > 0 && hasLowStock(this.productResponseFull!)">
      <span class="text-[9px] font-black uppercase tracking-widest text-white bg-[#FF8DA1] px-3 py-1.5 shadow-[4px_4px_0px_#FFDDE4]">
        Hot ✨
      </span>
    </div>

    <img
      [src]="getMainImage(this.productResponseFull!).url"
      [alt]="this.productResponseFull!.name"
      class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
      (error)="handleImageError($event)"
    >
    
    <div class="absolute inset-0 bg-[#FF8DA1]/5 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
  </div>

  <div class="flex flex-col p-4 flex-grow">
    
    <p class="text-[9px] font-black text-[#A7E9FF] uppercase tracking-[0.2em] mb-1">K-Beauty Edition</p>

    <h3
      class="text-xs sm:text-sm font-black text-gray-800 tracking-tighter uppercase leading-tight cursor-pointer hover:text-[#FF8DA1] transition-colors line-clamp-2 mb-2"
      (click)="viewProductDetail(this.productResponseFull!)">
      {{ this.productResponseFull!.name }}
    </h3>

    <div class="flex flex-wrap items-baseline gap-2 mb-3">
      <span class="text-sm sm:text-base font-black text-[#FF8DA1]">
        {{ getProductPriceRange(this.productResponseFull!) }}
      </span>
      <span class="text-[10px] text-gray-300 line-through font-bold">
        {{ getFirstProductPrice(this.productResponseFull!) }}
      </span>
    </div>

    <div class="mt-auto flex items-center justify-between pt-3 border-t border-[#F0FAFF]">
      
      <div *ngIf="this.productResponseFull!.variants.length"
           class="flex -space-x-1">
        <div
          *ngFor="let variant of this.productResponseFull!.variants.slice(0, 4)"
          class="w-4 h-4 border border-white shadow-sm"
          [style.background-color]="variant.toneCode">
        </div>
        <div *ngIf="this.productResponseFull!.variants.length > 4" 
             class="w-4 h-4 bg-gray-50 flex items-center justify-center border border-white">
          <span class="text-[7px] font-bold text-gray-400">+</span>
        </div>
      </div>

      <button (click)="viewProductDetail(this.productResponseFull!)" 
              class="w-8 h-8 bg-[#F0FAFF] text-[#49B6D6] hover:bg-[#49B6D6] hover:text-white transition-colors flex items-center justify-center">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
        </svg>
      </button>
    </div>
  </div>

  <div class="absolute bottom-0 left-0 w-full h-1 bg-[#FF8DA1] scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-500"></div>
</div>
