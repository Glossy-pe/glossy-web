<div class="group flex flex-col bg-white border border-gray-100 transition-all duration-300 h-full">

  <!-- Imagen: relación de aspecto más compacta en mobile -->
  <div class="relative aspect-[3/4] sm:aspect-[4/5] overflow-hidden bg-stone-50 cursor-pointer"
       (click)="viewProductDetail(this.productResponseFull!)">

    <!-- Badge: stock bajo -->
    <div class="absolute top-2 left-2 z-20 sm:top-3 sm:left-3"
         *ngIf="hasLowStock(this.productResponseFull!)">
      <span class="text-[8px] sm:text-[9px] font-light uppercase tracking-[0.2em] text-white bg-black/80 px-1.5 py-0.5 sm:px-2 sm:py-1">
        Últimas unidades
      </span>
    </div>

    <!-- Badge: agotado -->
    <div class="absolute top-2 left-2 z-20 sm:top-3 sm:left-3"
         *ngIf="getTotalStock(this.productResponseFull!) == 0">
      <span class="text-[8px] sm:text-[9px] font-light uppercase tracking-[0.2em] text-white bg-red-600/80 px-1.5 py-0.5 sm:px-2 sm:py-1">
        Agotado
      </span>
    </div>

    <img
      [src]="getMainImage(this.productResponseFull!).url"
      [alt]="this.productResponseFull!.name"
      class="w-full h-full object-cover transition-opacity duration-500 group-hover:opacity-90"
      (error)="handleImageError($event)"
    >
  </div>

  <!-- Info del producto -->
  <div class="flex flex-col p-3 sm:p-4 flex-grow gap-1.5 sm:gap-2">

    <!-- Estrellas -->
    <div class="flex items-center gap-1">
      <div class="flex text-amber-300">
        <svg *ngFor="let star of [1,2,3,4,5]"
             class="w-2.5 h-2.5 fill-current"
             viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
      </div>
      <span class="text-[9px] text-gray-300 font-light">(12)</span>
    </div>

    <!-- Nombre del producto -->
    <h3
      class="text-xs sm:text-sm font-light text-black tracking-wide leading-snug sm:leading-relaxed cursor-pointer hover:opacity-60 transition-opacity line-clamp-2"
      (click)="viewProductDetail(this.productResponseFull!)">
      {{ this.productResponseFull!.name }}
    </h3>

    <!-- Precios -->
    <div class="flex flex-wrap items-center gap-x-2 gap-y-0.5">
      <span class="text-sm sm:text-base font-medium text-lime-500 tracking-tight">
        {{ getProductPriceRange(this.productResponseFull!) }}
      </span>
      <span class="text-[11px] sm:text-xs text-gray-300 line-through font-light">
        {{ getFirstProductPrice(this.productResponseFull!) }}
      </span>
      <span class="text-[11px] sm:text-xs font-light text-red-500">
        -15%
      </span>
    </div>

    <!-- Variantes de color -->
    <div *ngIf="this.productResponseFull!.variants.length"
         class="flex flex-wrap gap-1 mt-auto pt-1">
      <div
        *ngFor="let variant of this.productResponseFull!.variants.slice(0, 5)"
        class="w-3 h-3 rounded-full border border-gray-100 shadow-sm"
        [style.background-color]="variant.toneCode">
      </div>
    </div>

  </div>
</div>
