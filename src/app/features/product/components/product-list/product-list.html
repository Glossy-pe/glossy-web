<div class="max-w-7xl mx-auto bg-[#FFFDF9] min-h-screen font-sans text-gray-800">

  <div *ngIf="showFilters"
    class="fixed inset-0 bg-[#49B6D6]/20 z-40 backdrop-blur-[2px]"
    (click)="toggleFilters()">
  </div>

  <aside
    class="fixed top-0 left-0 h-full w-72 bg-white z-50 border-r-2 border-[#A7E9FF] shadow-[10px_0px_0px_#F0FAFF] flex flex-col transition-transform duration-300 ease-in-out"
    [class.-translate-x-full]="!showFilters"
    [class.translate-x-0]="showFilters">

    <div class="flex items-center justify-between px-6 py-6 border-b-2 border-[#F0FAFF]">
      <span class="text-[11px] font-black text-[#49B6D6] uppercase tracking-[0.4em]">Filtros</span>
      <button (click)="toggleFilters()"
        class="w-8 h-8 flex items-center justify-center text-[#FF8DA1] hover:scale-110 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto px-4 py-6 space-y-3">
      <button (click)="filterByCategory('')"
        class="w-full text-left px-5 py-4 text-[10px] font-black uppercase tracking-[0.2em] border-2 transition-all"
        [ngClass]="selectedCategoryId === '' ? 'bg-[#FF8DA1] border-[#FF8DA1] text-white shadow-[4px_4px_0px_#FFDDE4]' : 'bg-white border-[#F0FAFF] text-gray-400 hover:border-[#FF8DA1]'">
        ✦ Ver Todo
      </button>

      <button *ngFor="let category of categories$ | async; let i = index"
        (click)="filterByCategory(category.id.toString())"
        class="w-full text-left px-5 py-4 text-[10px] font-black uppercase tracking-[0.2em] border-2 transition-all"
        [ngClass]="{
          'bg-[#49B6D6] border-[#49B6D6] text-white shadow-[4px_4px_0px_#E5F9FF]': selectedCategoryId === category.id.toString(),
          'bg-white border-[#F0FAFF] text-gray-400 hover:border-[#49B6D6]': selectedCategoryId !== category.id.toString()
        }">
        {{ category.name }}
      </button>
    </div>

    <div class="px-6 py-5 border-t-2 border-[#F0FAFF] bg-[#F0FAFF]/50">
      <p class="text-[9px] text-[#A7E9FF] font-black uppercase tracking-widest text-center italic">Seoul Summer Collection</p>
    </div>
  </aside>

  <header class="px-4 pt-10 pb-6 sm:px-10 border-b-2 border-[#FFDDE4] bg-white">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-8">
      <div>
        <h1 class="text-4xl sm:text-6xl font-black text-[#FF8DA1] tracking-tighter italic leading-none">Shop Makeup</h1>
        <div class="flex items-center gap-3 mt-2">
          <div class="h-1 w-12 bg-[#A7E9FF]"></div>
          <p class="text-[#FFB5C2] font-black tracking-[0.4em] uppercase text-[10px]">Pure Glow Edition</p>
        </div>
      </div>

      <button (click)="toggleFilters()"
        class="relative flex items-center gap-3 border-2 border-[#FF8DA1] px-6 py-3 text-[11px] uppercase tracking-widest bg-white text-[#FF8DA1] font-black shadow-[4px_4px_0px_#FFDDE4] hover:translate-x-1 hover:-translate-y-1 transition-all active:shadow-none active:translate-y-0">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 4h13M3 8h9m-9 4h13m-5 4h5" /></svg>
        Filtrar por
        <span *ngIf="selectedCategoryId !== ''" class="w-2 h-2 bg-[#49B6D6]"></span>
      </button>
    </div>

    <div class="relative w-full max-w-2xl">
      <input [formControl]="searchControl" type="text" 
        placeholder="BUSCA TU FAVORITO..."
        class="w-full px-5 py-4 bg-[#F0FAFF] border-2 border-transparent focus:border-[#A7E9FF] focus:bg-white focus:outline-none text-xs font-bold uppercase tracking-widest transition-all placeholder-[#A7E9FF]" />
      <span class="absolute right-5 top-1/2 -translate-y-1/2 text-[#49B6D6]">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
      </span>
    </div>
  </header>

  <main class="px-4 sm:px-10 py-10">

    <div *ngIf="selectedCategoryId !== ''" class="mb-8 flex items-center gap-3">
      <span class="text-[10px] text-[#A7E9FF] font-black uppercase tracking-widest italic">Filtering:</span>
      <span class="flex items-center gap-2 px-4 py-1.5 bg-[#49B6D6] text-white text-[10px] font-black uppercase tracking-widest border-b-4 border-[#A7E9FF]">
        {{ activeCategoryName }}
        <button (click)="filterByCategory('')" class="ml-2 hover:scale-125 transition-transform">✕</button>
      </span>
    </div>

    <div *ngIf="isLoading && allProducts.length === 0" class="py-32 text-center">
      <div class="inline-block animate-bounce h-2 w-2 bg-[#FF8DA1] mr-1"></div>
      <div class="inline-block animate-bounce h-2 w-2 bg-[#A7E9FF] mr-1" style="animation-delay: 0.1s"></div>
      <div class="inline-block animate-bounce h-2 w-2 bg-[#FFDDE4]" style="animation-delay: 0.2s"></div>
      <p class="text-[10px] uppercase tracking-[0.5em] text-[#FFB5C2] font-black mt-4">Cargando Belleza...</p>
    </div>

    <ng-container *ngIf="!isLoading || allProducts.length > 0">
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
        <div *ngFor="let product of filteredProducts"
          class="group border-2 border-[#F0FAFF] bg-white p-2 hover:border-[#FFDDE4] transition-colors relative">
          <div class="absolute top-0 right-0 w-0 h-0 border-t-[15px] border-r-[15px] border-t-transparent border-r-[#FFDDE4] opacity-0 group-hover:opacity-100 transition-opacity"></div>
          
          <app-product-card [productResponseFull]="product" class="w-full"></app-product-card>
        </div>
      </div>

      <div *ngIf="filteredProducts.length === 0 && !isLoading"
        class="py-24 text-center border-2 border-dashed border-[#FFDDE4] bg-white">
        <p class="text-[11px] uppercase tracking-[0.4em] text-[#FFB5C2] font-black">No encontramos ese brillo por aquí ☁️</p>
      </div>

      <div *ngIf="hasMore" class="mt-16 flex flex-col items-center gap-4">
        <button (click)="loadMore()" [disabled]="isLoading"
          class="w-full sm:w-auto px-12 py-5 text-[11px] font-black uppercase tracking-[0.3em] bg-white border-2 border-[#FF8DA1] text-[#FF8DA1] shadow-[6px_6px_0px_#FFDDE4] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all disabled:opacity-50">
          {{ isLoading ? 'Cargando...' : 'Ver más productos ✦' }}
        </button>
        <div class="h-1 w-20 bg-[#F0FAFF]"></div>
        <p class="text-[10px] text-[#A7E9FF] font-bold uppercase tracking-widest">
          {{ filteredProducts.length }} / {{ totalElements }} Items
        </p>
      </div>
    </ng-container>
  </main>
</div>
