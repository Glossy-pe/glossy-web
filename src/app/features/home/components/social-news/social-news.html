
<section class="py-20 relative overflow-hidden bg-[#fff9e6] border-t-4 border-[#fff0e0]">

  <div class="absolute inset-0 opacity-[0.03] pointer-events-none" 
       style="background-image: radial-gradient(#49B6D6 2px, transparent 2px); background-size: 30px 30px;">
  </div>

  <div class="container mx-auto px-4 max-w-7xl relative z-10">

    <div class="text-center mb-16">
      <div class="inline-block border-2 border-[#FF8DA1] px-6 py-2 mb-4 shadow-[4px_4px_0px_#FFDDE4]">
        <h2 class="text-2xl md:text-4xl font-black text-gray-800 tracking-tighter italic uppercase leading-none">
          Social <span class="text-[#FF8DA1]">Moments</span>
        </h2>
      </div>
      <p class="text-[10px] md:text-xs font-black text-[#A7E9FF] uppercase tracking-[0.4em] mt-2">
        ✨ Inspiración Coreana en Tiempo Real ✨
      </p>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-8 px-2">
      <a *ngFor="let video of videos; let i = index"
        [href]="video.url" target="_blank"
        class="group relative block transition-all duration-500 hover:-translate-y-2">

        <div class="absolute -top-2 left-1/2 -translate-x-1/2 w-20 h-5 z-20 shadow-sm border-x-2 border-white/20"
          [style.background-color]="i % 2 === 0 ? '#FFDDE4' : '#E5F9FF'">
        </div>

        <div class="bg-white p-3 pb-8 border-2 border-[#F0FAFF] shadow-[8px_8px_0px_#F0FAFF] group-hover:shadow-[8px_8px_0px_#FFDDE4] group-hover:border-[#FFDDE4] transition-all">
          
          <div class="relative aspect-[9/16] overflow-hidden bg-gray-50 border border-[#F0FAFF]">
            <img [src]="video.image" class="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-700" [alt]="video.title"/>

            <div class="absolute inset-0 bg-[#49B6D6]/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>

            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
              <div class="w-12 h-12 bg-white border-2 border-[#FF8DA1] flex items-center justify-center text-[#FF8DA1]">
                <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </div>
            </div>

            <div class="absolute top-2 right-2 bg-white border border-gray-100 px-2 py-0.5">
              <span class="text-gray-400 text-[8px] font-black uppercase tracking-widest">{{ i % 2 === 0 ? 'TikTok' : 'Insta' }}</span>
            </div>
          </div>

          <div class="mt-5 px-1">
            <span class="text-[10px] md:text-xs font-black text-gray-700 uppercase leading-tight tracking-tighter line-clamp-2 italic">
              {{ video.title }}
            </span>
            <div class="h-1 w-8 bg-[#A7E9FF] mt-2 group-hover:w-full transition-all duration-500"></div>
          </div>
        </div>
      </a>
    </div>

    <div class="mt-16 text-center">
      <a href="#" class="inline-block bg-[#A7E9FF] text-white px-8 py-4 text-[11px] font-black uppercase tracking-[0.3em] shadow-[6px_6px_0px_#E5F9FF] hover:translate-x-1 hover:translate-y-1 hover:shadow-none transition-all">
        Ver todo el Feed ✦
      </a>
    </div>
  </div>
</section>
