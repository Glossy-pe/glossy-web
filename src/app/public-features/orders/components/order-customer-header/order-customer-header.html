<div class="bg-white border-b border-gray-100 px-4 py-6">
  <div class="mx-auto max-w-2xl">
    <p class="text-xs text-gray-400 mb-1">Orden #{{ order.id }} · {{ order.orderCode || '—' }}</p>
    <h1 class="text-2xl font-bold text-gray-900 mb-0.5">{{ order.customerName }}</h1>
    <p class="text-sm text-gray-400">{{ order.customerAddress }}</p>

    <div class="mt-4 flex justify-between items-center gap-4">
      <div>
        @if (order.orderStatus) {
        <div class="inline-flex items-center gap-2 rounded-full border px-3 py-1"
          [style.border-color]="order.orderStatus.hexColor"
          [style.background-color]="order.orderStatus.hexColor + '15'">
          <span class="h-2 w-2 rounded-full animate-pulse"
            [style.background-color]="order.orderStatus.hexColor"></span>
          <span class="text-xs font-semibold" [style.color]="order.orderStatus.hexColor">
            {{ order.orderStatus.code }}
          </span>
          <span class="text-[10px] text-gray-400 font-normal">· Estado en tiempo real</span>
        </div>
        }
      </div>

      @if (isAdmin) {
        <button type="button" (click)="adminClick.emit()"
          class="flex items-center gap-1.5 rounded-full border border-[#FF8DA1] px-3 py-1 text-[11px] text-[#FF8DA1] hover:bg-[#FFF5F7] transition-colors shrink-0">
          <svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Ver en admin
        </button>
      }
    </div>

    <div class="mt-4 flex items-center gap-3">
      <button type="button" (click)="refreshClick.emit()" [disabled]="isLoading"
        class="flex items-center gap-1.5 rounded-full border border-gray-200 px-3 py-1 text-[11px] text-gray-500 hover:border-gray-300 hover:text-gray-700 disabled:opacity-40 transition-colors">
        <svg class="h-3 w-3" [class.animate-spin]="isLoading" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Actualizar
      </button>

      @if (lastUpdated) {
      <span class="text-[10px] text-gray-300">
        Actualizado {{ lastUpdated | date:'HH:mm:ss' }}
      </span>
      }
    </div>
  </div>
</div>
