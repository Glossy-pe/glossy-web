<div class="mb-4">
  <button
    (click)="goBack()"
    class="flex items-center gap-1.5 text-sm text-gray-500 transition hover:text-gray-800">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
    Volver al inicio
  </button>
</div>

@if (product(); as p) {
  <div class="product-container">
    <app-product-main-detail [productId]="p.id" />
    <app-product-images-list [productId]="p.id" />
    <app-variant-list [productId]="p.id" />
  </div>
}
