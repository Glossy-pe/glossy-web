
<div class="min-h-screen bg-gray-50 p-6">

  <!-- Volver -->
  <button
    (click)="goBack()"
    class="mb-4 flex items-center gap-1.5 text-sm text-gray-500 transition hover:text-gray-800">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
    Volver al inicio
  </button>

  @if (variant(); as v) {
    <!-- Encabezado del producto -->
    <!-- <div class="mb-6 flex flex-wrap items-center gap-3">
      <h1 class="text-2xl font-bold text-gray-900">{{ v.toneName }}</h1>
      <span class="rounded-md border px-2 py-0.5 text-[11px] font-medium"
        [class]="v.active
          ? 'bg-green-50 text-green-700 border-green-200'
          : 'bg-gray-100 text-gray-600 border-gray-200'">
        {{ v.active ? 'Activo' : 'Inactivo' }}
      </span>
      <span class="font-mono text-xs text-gray-400">ID #{{ v.id }}</span>
    </div> -->

    <!-- Imágenes + datos principales: van juntos porque se consultan juntos -->
    <div class="grid grid-cols-1 gap-6 lg:grid-cols-5 lg:items-start">

      <div class="lg:col-span-2">
        <app-variant-main-detail [variantId]="v.id" />
      </div>
      
      <div class="lg:col-span-3">
        <app-variant-images-list [variantId]="v.id" />
      </div>

      
      
    </div>

    <!-- Variantes: ancho completo porque suele ser tabla/lista -->
    <div class="mt-6">
      <app-order-list [variantId]="v.id"/>
    </div>

  } @else {
    <!-- Skeleton mientras carga el producto -->
    <div class="animate-pulse space-y-6">
      <div class="h-7 w-64 rounded bg-gray-200"></div>
      <div class="grid grid-cols-1 gap-6 lg:grid-cols-5">
        <div class="aspect-square rounded-xl bg-gray-200 lg:col-span-2"></div>
        <div class="space-y-3 lg:col-span-3">
          <div class="h-4 w-1/2 rounded bg-gray-200"></div>
          <div class="h-4 w-3/4 rounded bg-gray-200"></div>
          <div class="h-24 w-full rounded bg-gray-200"></div>
        </div>
      </div>
      <div class="h-40 w-full rounded-xl bg-gray-200"></div>
    </div>
  }

</div>
