<div class="p-6 bg-white min-h-screen font-sans text-slate-900">
  
  <!-- BARRA DE CONTROL MINIMALISTA -->
  <header class="mb-6 flex flex-wrap items-end justify-between gap-6 border-b border-slate-100 pb-6">
    <div class="space-y-1">
      <h1 class="text-xs font-black uppercase tracking-[0.3em] text-slate-400">Inventory Monitor</h1>
      <p class="text-xl font-light">Control de <span class="font-medium">Stock Crítico</span></p>
    </div>

    <!-- Filtros Compactos -->
    <div class="flex items-center gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-[9px] font-black uppercase tracking-widest text-slate-400">Buscar Producto</label>
        <input type="text" placeholder="Nombre o ID..." 
          class="border-b border-slate-200 py-1 text-sm focus:outline-none focus:border-black transition-colors bg-transparent placeholder:text-slate-300">
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-[9px] font-black uppercase tracking-widest text-slate-400">Filtrar Estado</label>
        <select class="bg-transparent text-sm font-medium focus:outline-none cursor-pointer border-b border-slate-200 py-1">
          <option>Todos los estados</option>
          <option>Solo Agotados</option>
          <option>Stock Bajo</option>
        </select>
      </div>

      <div class="h-8 w-px bg-slate-100 mx-2"></div>

      <div class="flex flex-col items-end">
        <span class="text-[9px] font-black uppercase text-slate-400 leading-none">Total Alertas</span>
        <span class="text-lg font-mono font-bold leading-none">{{ alerts().length }}</span>
      </div>
    </div>
  </header>

  <!-- GRID DE ALTA DENSIDAD -->
  <!-- Configuramos más columnas: de 1 en móvil hasta 6 o 7 en monitores grandes -->
  <div *ngIf="!isLoading()" 
    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-px bg-slate-200 border border-slate-200">
    
    <div *ngFor="let alert of alerts()" 
      class="bg-white group relative hover:z-10 flex flex-col h-full">
      
      <!-- Miniatura Cuadrada -->
      <div class="relative aspect-square overflow-hidden bg-slate-50">
        <img [src]="alert.firstImageUrl || fallbackImg" 
          class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"/>
        
        <!-- Dismiss sutil (aparece al hover) -->
        <button (click)="dismiss(alert.alertId)"
          class="absolute top-0 right-0 p-2 bg-white/80 opacity-0 group-hover:opacity-100 transition-opacity">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- Info Compacta -->
      <div class="p-3 flex flex-col flex-1">
        <div class="flex items-start justify-between gap-2 mb-1">
          <h3 class="text-[11px] font-bold leading-tight uppercase truncate" [title]="alert.toneName">
            {{ alert.toneName }}
          </h3>
          <div class="w-3 h-3 shrink-0 border border-slate-100 shadow-sm" [style.background-color]="alert.toneCode"></div>
        </div>
        
        <p class="text-[9px] font-mono text-slate-400 mb-3">#{{ alert.variantId }}</p>

        <div class="mt-auto flex items-end justify-between">
          <div class="flex flex-col">
            <span class="text-[8px] font-black text-slate-300 uppercase leading-none mb-1">Stock</span>
            <span [class]="isOutOfStock(alert) ? 'text-red-500' : 'text-slate-900'" 
                  class="text-[10px] font-black uppercase tracking-tighter leading-none">
              {{ isOutOfStock(alert) ? 'OUT' : alert.stock + ' UN' }}
            </span>
          </div>
          <span class="text-[9px] font-mono text-slate-400 group-hover:text-black transition-colors">
            {{ alert.toneCode }}
          </span>
        </div>
      </div>

      <!-- Línea indicadora de prioridad -->
      <div class="h-[2px] w-full"
           [class.bg-red-500]="isOutOfStock(alert)"
           [class.bg-slate-900]="!isOutOfStock(alert)"></div>
    </div>

  </div>
</div>
