<div class="mb-6 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">

  <!-- Header colapsable -->
  <button
    (click)="toggleCollapse()"
    class="w-full flex items-center justify-between px-6 py-4 hover:bg-slate-50 transition-colors">
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
      <span class="text-sm font-bold text-slate-800">Alertas de Stock</span>
      <span *ngIf="!isLoading()" class="px-2 py-0.5 text-[10px] font-black bg-red-50 text-red-600 border border-red-100 rounded-lg uppercase tracking-wider">
        {{ productsWithAlerts().length }} productos críticos
      </span>
    </div>
    <svg class="w-4 h-4 text-slate-400 transition-transform duration-200"
      [class.rotate-180]="!isCollapsed()"
      fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Contenido -->
  <div *ngIf="!isCollapsed()">

    <!-- Loading -->
    <div *ngIf="isLoading()" class="px-6 pb-6 flex items-center gap-3 text-slate-400">
      <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      <span class="text-xs font-medium">Revisando stock...</span>
    </div>

    <!-- Sin alertas -->
    <div *ngIf="!isLoading() && productsWithAlerts().length === 0"
      class="px-6 pb-6 flex items-center gap-3 text-emerald-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke-width="2"/>
        <polyline points="22 4 12 14.01 9 11.01" stroke-width="2"/>
      </svg>
      <span class="text-xs font-semibold">Todo el stock está abastecido</span>
    </div>

<!-- Grid de productos críticos — scroll horizontal, mobile-first -->
<div *ngIf="!isLoading() && productsWithAlerts().length > 0" class="pb-4">

  <!-- Indicador de scroll en mobile -->
  <p class="px-6 pb-2 text-[10px] text-slate-400 flex items-center gap-1.5 md:hidden">
    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Desliza para ver más
  </p>

  <div class="flex gap-3 overflow-x-scroll px-6 pb-3 snap-x snap-mandatory scroll-smooth">


    <div *ngFor="let product of productsWithAlerts()"
      class="flex-none w-[82vw] sm:w-72 snap-start
             border-2 border-slate-100 rounded-2xl overflow-hidden flex flex-col
             shadow-sm shadow-slate-100">

      <!-- Cabecera producto -->
      <div class="flex items-center gap-3 p-4 bg-slate-50 border-b-2 border-slate-100">
        <div class="w-14 h-14 rounded-xl overflow-hidden border-2 border-white shadow-sm bg-white shrink-0">
          <img [src]="getMainImage(product)" [alt]="product.name"
            class="w-full h-full object-cover"/>
        </div>
        <div class="min-w-0">
          <h3 class="text-sm font-black text-slate-800 truncate leading-tight">{{ product.name }}</h3>
          <p class="text-[10px] font-semibold text-slate-400 mt-0.5 uppercase tracking-wide">
            {{ getAlertCount(product) }} variante{{ getAlertCount(product) > 1 ? 's' : '' }} crítica{{ getAlertCount(product) > 1 ? 's' : '' }}
          </p>
        </div>
      </div>

<!-- Variantes críticas -->
<div class="p-3 flex flex-wrap gap-2 flex-1 content-start">
  <div *ngFor="let variant of getCriticalVariants(product)"
    class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl border-2"
    [class.bg-red-50]="variant.stock === 0"
    [class.border-red-200]="variant.stock === 0"
    [class.bg-amber-50]="variant.stock === 1"
    [class.border-amber-200]="variant.stock === 1">

    <!-- Tono -->
    <div *ngIf="variant.toneCode"
      class="w-3 h-3 rounded-full border-2 border-white shadow shrink-0"
      [style.background-color]="variant.toneCode">
    </div>
    <span class="text-[11px] font-bold text-slate-700 whitespace-nowrap">{{ variant.toneName }}</span>

    <!-- Divider -->
    <span class="text-slate-300 text-xs">·</span>

    <!-- Stock -->
    <span class="text-[11px] font-black whitespace-nowrap"
      [class.text-red-600]="variant.stock === 0"
      [class.text-amber-600]="variant.stock === 1">
      {{ variant.stock === 0 ? 'Agotado' : '1 ud.' }}
    </span>
  </div>
</div>
      <!-- Barra de urgencia -->
      <div class="h-1.5 w-full bg-slate-100">
        <div class="h-full rounded-full transition-all duration-500"
          [style.width.%]="getUrgencyPercentage(product)"
          [class.bg-red-500]="getUrgencyPercentage(product) > 50"
          [class.bg-amber-400]="getUrgencyPercentage(product) <= 50">
        </div>
      </div>

    </div>
  </div>
</div>
  </div>

</div>
