<section class="max-w-md mx-auto p-5 bg-[#FBFBFB] min-h-screen font-sans">
  
  <header class="flex items-end justify-between mb-8 pb-3 border-b border-slate-100 sticky top-0 z-20 bg-[#FBFBFB]/90 backdrop-blur-sm">
    <div class="flex items-baseline gap-3">
      <h2 class="text-2xl font-light text-slate-900 tracking-tight">Stock</h2>
      <span class="text-xs font-medium text-slate-400 uppercase tracking-widest">Alertas</span>
    </div>
    
    @if (alerts().length > 0) {
      <button 
        (click)="clearAll()"
        class="text-[10px] font-semibold text-slate-400 hover:text-red-400 active:scale-95 transition-all uppercase tracking-widest bg-white px-4 py-2 rounded-full shadow-sm border border-slate-100">
        Borrar
      </button>
    }
  </header>

  <div class="grid grid-cols-2 gap-x-4 gap-y-6">
    
    @for (alert of alerts(); track alert.alertId) {
      <div class="group relative flex flex-col active:scale-[0.99] transition-all duration-300 ease-out">
        
        <button 
          (click)="dismiss(alert.alertId); $event.stopPropagation()"
          class="absolute top-2 right-2 z-10 p-1.5 rounded-full bg-white/70 backdrop-blur-sm text-slate-300 hover:text-red-400 active:bg-white transition-colors"
          aria-label="Descartar">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
          </svg>
        </button>

        <div class="relative aspect-square w-full overflow-hidden bg-white rounded-3xl shadow-sm border border-slate-50 mb-3.5">
          <img
            [src]="alert.mainImageUrl || 'assets/no-image.png'"
            [alt]="alert.productName + ' ' + alert.toneName"
            class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105"
          />
        </div>

        <div class="px-1 flex flex-col flex-1 gap-1.5">
          
          <p class="text-[13px] font-semibold text-slate-900 leading-tight">
            {{ alert.toneName }}
          </p>

          <h3 class="text-[11px] font-medium text-slate-500 leading-snug line-clamp-1">
            {{ alert.productName }}
          </h3>
          
          <div class="mt-1 flex items-center justify-between text-[9px] font-medium tracking-wide">
            <div class="flex items-center gap-1.5 bg-[#FFE6E6] text-red-600 px-2 py-0.5 rounded-full">
              <span class="h-1 w-1 rounded-full bg-red-500 animate-pulse"></span>
              Agotado
            </div>
            <span class="font-mono text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded">
              {{ alert.occurredAt | date:'HH:mm' }}
            </span>
          </div>
        </div>

      </div>
    } @empty {
      <div class="col-span-2 flex flex-col items-center justify-center pt-24 pb-16 text-center bg-white rounded-[32px] border border-slate-50 shadow-inner">
        <div class="rounded-full bg-[#E6F3F3] p-7 mb-6 border-[10px] border-[#F0F9F9]">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-[#7ACDCF]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <p class="text-base font-light text-slate-900 tracking-tight">Todo actualizado</p>
        <p class="text-xs text-slate-400 mt-1.5 max-w-xs font-normal">No hay alertas de stock críticas en este momento.</p>
      </div>
    }

  </div>
</section>
